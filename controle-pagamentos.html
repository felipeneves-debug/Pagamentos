<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>💸 Controle de Pagamentos</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0a0a0f;color:#e2e8f0;font-family:'DM Sans',system-ui,sans-serif;font-size:14px;min-height:100vh}
  button{font-family:inherit;cursor:pointer}
  input{font-family:inherit}
  ::-webkit-scrollbar{width:6px}
  ::-webkit-scrollbar-track{background:#0f0f1a}
  ::-webkit-scrollbar-thumb{background:#2d2d44;border-radius:3px}

  /* HEADER */
  .header{background:#0f0f1a;border-bottom:1px solid #1e1e2e;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;position:sticky;top:0;z-index:10}
  .logo{font-size:21px;font-weight:800;background:linear-gradient(90deg,#a78bfa,#60a5fa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .subtitle{font-size:11px;color:#475569;margin-top:2px}
  .header-right{display:flex;gap:10px;align-items:center}
  .total-box{background:#1e1e2e;border:1px solid #2d2d44;border-radius:10px;padding:7px 16px;text-align:center}
  .total-label{font-size:9px;color:#64748b;text-transform:uppercase;letter-spacing:1px}
  .total-value{font-size:18px;font-weight:700;color:#a78bfa}
  .btn-new{background:linear-gradient(135deg,#7c3aed,#4f46e5);border:none;border-radius:9px;padding:9px 18px;color:#fff;font-weight:700;font-size:13px;transition:opacity .15s}
  .btn-new:hover{opacity:.85}
  .saved-msg{font-size:11px;color:#4ade80;opacity:0;transition:opacity .3s}
  .saved-msg.show{opacity:1}

  /* TABS */
  .tabs{padding:14px 24px 0;display:flex;gap:3px}
  .tab{background:transparent;border:1px solid transparent;border-radius:7px 7px 0 0;padding:7px 18px;color:#64748b;font-weight:600;font-size:12px;transition:all .15s}
  .tab.active{background:#0f0f1a;border-color:#1e1e2e;color:#a78bfa}

  /* CONTENT */
  .content{padding:0 24px 32px}
  .panel{background:#0f0f1a;border:1px solid #1e1e2e;border-radius:0 10px 10px 10px;overflow:hidden}

  /* LISTA */
  .pay-row{display:flex;align-items:center;gap:12px;padding:14px 18px;border-bottom:1px solid #1e1e2e;flex-wrap:wrap;transition:background .15s}
  .pay-row:last-child{border-bottom:none}
  .pay-row:hover{background:#13131f}
  .pay-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
  .pay-info{flex:1;min-width:150px}
  .pay-name{font-weight:600;font-size:14px}
  .pay-meta{font-size:11px;color:#64748b;margin-top:2px;line-height:1.5}
  .pay-meta b{color:#a78bfa}
  .pay-value{text-align:right;min-width:90px}
  .pay-amount{font-size:17px;font-weight:700}
  .pay-per{font-size:10px;color:#64748b}
  .pay-dates{min-width:120px;font-size:11px;color:#64748b;line-height:1.7}
  .pay-dates span{color:#94a3b8}
  .pay-actions{display:flex;gap:5px}
  .btn-edit{background:#1e1e2e;border:1px solid #2d2d44;border-radius:7px;padding:5px 11px;color:#94a3b8;font-size:11px;transition:all .15s}
  .btn-edit:hover{border-color:#4f46e5;color:#a78bfa}
  .btn-del{background:#1a0a0a;border:1px solid #3b1a1a;border-radius:7px;padding:5px 9px;color:#f87171;font-size:11px;transition:all .15s}
  .btn-del:hover{background:#2a0a0a}
  .empty{padding:50px;text-align:center;color:#374151}
  .empty-icon{font-size:40px}

  /* BADGE */
  .badge{display:inline-block;padding:2px 9px;border-radius:99px;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase}
  .badge-ok{color:#4ade80;background:#052e16;border:1px solid #4ade8044}
  .badge-late{color:#f97316;background:#431407;border:1px solid #f9731644}
  .badge-end{color:#6b7280;background:#1f2937;border:1px solid #6b728044}

  /* CALENDAR */
  .cal-panel{padding:18px}
  .cal-title{text-align:center;margin-bottom:14px;font-size:17px;font-weight:800;color:#a78bfa}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
  .cal-dow{font-size:9px;color:#4b5563;font-weight:700;text-align:center;letter-spacing:1px;padding:3px 0;margin-bottom:4px}
  .cal-day{min-height:54px;border-radius:7px;background:#13131f;border:1px solid #1e1e2e;padding:4px}
  .cal-day.today{background:#1a1a2e;border-color:#7c3aed}
  .cal-day-num{font-size:11px;font-weight:400;color:#4b5563}
  .cal-day.today .cal-day-num{font-weight:700;color:#a78bfa}
  .cal-chip{margin-top:3px;border-radius:3px;padding:1px 4px;font-size:8px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .cal-legend{margin-top:14px;display:flex;gap:12px;flex-wrap:wrap}
  .cal-legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:#94a3b8}
  .cal-legend-dot{width:7px;height:7px;border-radius:2px}

  /* MODAL */
  .overlay{display:none;position:fixed;inset:0;background:#000b;backdrop-filter:blur(4px);z-index:50;align-items:center;justify-content:center;padding:16px}
  .overlay.open{display:flex}
  .modal{background:#0f0f1a;border:1px solid #2d2d44;border-radius:14px;width:100%;max-width:490px;padding:24px;box-shadow:0 25px 60px #000;max-height:90vh;overflow-y:auto}
  .modal-title{font-size:17px;font-weight:800;margin-bottom:18px}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px}
  .form-full{grid-column:1/-1}
  .form-label{font-size:10px;font-weight:600;color:#64748b;margin-bottom:3px;letter-spacing:.5px;text-transform:uppercase}
  .form-input{width:100%;background:#13131f;border:1px solid #2d2d44;border-radius:8px;padding:8px 11px;color:#e2e8f0;font-size:13px;outline:none;transition:border-color .15s}
  .form-input:focus{border-color:#7c3aed}
  .color-row{display:flex;gap:7px;margin-top:5px;flex-wrap:wrap}
  .color-dot{width:22px;height:22px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:all .15s}
  .color-dot.selected{border-color:#fff}
  .modal-actions{display:flex;gap:8px;margin-top:18px;justify-content:flex-end}
  .btn-cancel{background:#1e1e2e;border:1px solid #2d2d44;border-radius:9px;padding:9px 16px;color:#94a3b8;font-weight:500;transition:all .15s}
  .btn-cancel:hover{border-color:#4f46e5;color:#a78bfa}
  .btn-save{background:linear-gradient(135deg,#7c3aed,#4f46e5);border:none;border-radius:9px;padding:9px 20px;color:#fff;font-weight:700;font-size:13px;transition:opacity .15s}
  .btn-save:hover{opacity:.85}

  /* DELETE MODAL */
  .del-modal{background:#0f0f1a;border:1px solid #3b1a1a;border-radius:14px;padding:28px;max-width:340px;width:100%;text-align:center}
  .del-icon{font-size:36px}
  .del-title{font-weight:700;font-size:16px;margin:10px 0 6px}
  .del-sub{color:#6b7280;font-size:12px}
  .btn-del-confirm{background:#7f1d1d;border:1px solid #ef4444;border-radius:9px;padding:9px 16px;color:#fca5a5;font-weight:700;transition:all .15s}
  .btn-del-confirm:hover{background:#991b1b}

  @media(max-width:600px){
    .header{padding:12px 14px}
    .tabs,.content{padding-left:14px;padding-right:14px}
    .pay-dates{display:none}
    .form-grid{grid-template-columns:1fr}
    .form-full{grid-column:1}
  }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div>
    <div class="logo">💸 Controle de Pagamentos</div>
    <div class="subtitle">Gerencie seus compromissos financeiros</div>
  </div>
  <div class="header-right">
    <span class="saved-msg" id="savedMsg">✓ Salvo</span>
    <div class="total-box">
      <div class="total-label">Total / mês</div>
      <div class="total-value" id="totalValue">R$ 0,00</div>
    </div>
    <button class="btn-new" onclick="openNew()">＋ Novo</button>
  </div>
</div>

<!-- TABS -->
<div class="tabs">
  <button class="tab active" id="tab-lista" onclick="switchTab('lista')">📋 Lista</button>
  <button class="tab" id="tab-cal" onclick="switchTab('cal')">📅 Calendário</button>
</div>

<!-- CONTENT -->
<div class="content">
  <!-- LISTA -->
  <div class="panel" id="panel-lista">
    <div id="listContainer"></div>
  </div>

  <!-- CALENDÁRIO -->
  <div class="panel" id="panel-cal" style="display:none">
    <div class="cal-panel">
      <div class="cal-title" id="calTitle"></div>
      <div class="cal-grid" id="calDow"></div>
      <div class="cal-grid" id="calGrid" style="margin-top:4px"></div>
      <div class="cal-legend" id="calLegend"></div>
    </div>
  </div>
</div>

<!-- MODAL FORM -->
<div class="overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-title" id="modalTitle">➕ Novo Pagamento</div>
    <div class="form-grid">
      <div class="form-full">
        <div class="form-label">Nome / Pessoa</div>
        <input class="form-input" id="fNome" placeholder="Ex: João Silva" type="text"/>
      </div>
      <div>
        <div class="form-label">Valor (R$)</div>
        <input class="form-input" id="fValor" placeholder="800" type="number" min="0"/>
      </div>
      <div>
        <div class="form-label">Dia do vencimento</div>
        <input class="form-input" id="fDia" placeholder="10" type="number" min="1" max="31"/>
      </div>
      <div>
        <div class="form-label">Data de início</div>
        <input class="form-input" id="fInicio" type="date"/>
      </div>
      <div>
        <div class="form-label">Data de finalização</div>
        <input class="form-input" id="fFim" type="date"/>
      </div>
      <div>
        <div class="form-label">E-mail</div>
        <input class="form-input" id="fEmail" placeholder="email@exemplo.com" type="email"/>
      </div>
      <div>
        <div class="form-label">Telefone</div>
        <input class="form-input" id="fTel" placeholder="(11) 99999-9999" type="text"/>
      </div>
      <div class="form-full">
        <div class="form-label">Cor de identificação</div>
        <div class="color-row" id="colorRow"></div>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-save" onclick="handleSave()" id="btnSaveLabel">Adicionar</button>
    </div>
  </div>
</div>

<!-- MODAL DELETE -->
<div class="overlay" id="delOverlay">
  <div class="del-modal">
    <div class="del-icon">⚠️</div>
    <div class="del-title">Excluir pagamento?</div>
    <div class="del-sub">Essa ação não pode ser desfeita.</div>
    <div class="modal-actions" style="justify-content:center;margin-top:18px">
      <button class="btn-cancel" onclick="closeDelModal()">Cancelar</button>
      <button class="btn-del-confirm" onclick="confirmDelete()">Excluir</button>
    </div>
  </div>
</div>

<script>
const CORES = ["#4ade80","#60a5fa","#f472b6","#fb923c","#a78bfa","#facc15","#34d399","#f87171"];
const MONTHS = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
const MONTHS_SHORT = ["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];
const DOWS = ["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"];

let payments = JSON.parse(localStorage.getItem("pagamentos_v1") || "null") || [
  {id:1, nome:"Pagamento Mensal", valor:800, diaVencimento:10, dataInicio:"2025-01-10", dataFim:"2025-08-10", email:"", telefone:"", cor:"#4ade80"},
  {id:2, nome:"Pagamento Mensal", valor:1000, diaVencimento:13, dataInicio:"2025-01-13", dataFim:"2025-09-13", email:"", telefone:"", cor:"#60a5fa"},
];

let editingId = null;
let deletingId = null;
let selectedCor = "#a78bfa";
let currentTab = "lista";

function save() {
  localStorage.setItem("pagamentos_v1", JSON.stringify(payments));
  const msg = document.getElementById("savedMsg");
  msg.classList.add("show");
  setTimeout(() => msg.classList.remove("show"), 1600);
}

function parseDate(s) {
  if (!s) return null;
  const [y,m,d] = s.split("-").map(Number);
  return new Date(y, m-1, d);
}

function isEnded(p) {
  const f = parseDate(p.dataFim);
  return f ? f < new Date() : false;
}

function isOverdue(p) {
  if (isEnded(p)) return false;
  const t = new Date();
  return t > new Date(t.getFullYear(), t.getMonth(), p.diaVencimento);
}

function getMonthCount(s, e) {
  const st = parseDate(s), en = parseDate(e);
  if (!st || !en) return 0;
  let c = 0, cur = new Date(st.getFullYear(), st.getMonth(), 1);
  while (cur <= en) { c++; cur.setMonth(cur.getMonth()+1); }
  return c;
}

function formatBRL(v) {
  return Number(v).toLocaleString("pt-BR", {style:"currency", currency:"BRL"});
}

function formatDate(s) {
  if (!s) return "—";
  return s.split("-").reverse().join("/");
}

function badge(p) {
  if (isEnded(p)) return `<span class="badge badge-end">Encerrado</span>`;
  if (isOverdue(p)) return `<span class="badge badge-late">Vencido</span>`;
  return `<span class="badge badge-ok">Em dia</span>`;
}

// ---- RENDER LIST ----
function renderList() {
  const c = document.getElementById("listContainer");
  if (payments.length === 0) {
    c.innerHTML = `<div class="empty"><div class="empty-icon">🏦</div><div style="margin-top:10px">Nenhum pagamento cadastrado</div></div>`;
    return;
  }
  c.innerHTML = payments.map(p => `
    <div class="pay-row" style="opacity:${isEnded(p)?0.5:1}">
      <div class="pay-dot" style="background:${p.cor};box-shadow:0 0 7px ${p.cor}88"></div>
      <div class="pay-info">
        <div class="pay-name">${p.nome}</div>
        <div class="pay-meta">
          Dia <b>${p.diaVencimento}</b> · ${getMonthCount(p.dataInicio, p.dataFim)} parcelas
          ${p.email ? ` · ✉️ ${p.email}` : ""}
          ${p.telefone ? ` · 📱 ${p.telefone}` : ""}
        </div>
      </div>
      <div class="pay-value">
        <div class="pay-amount" style="color:${p.cor}">${formatBRL(p.valor)}</div>
        <div class="pay-per">por mês</div>
      </div>
      <div class="pay-dates">
        <div>🗓 <span>${formatDate(p.dataInicio)}</span></div>
        <div>🔚 <span>${formatDate(p.dataFim)}</span></div>
      </div>
      <div style="min-width:75px;text-align:center">${badge(p)}</div>
      <div class="pay-actions">
        <button class="btn-edit" onclick="openEdit(${p.id})">✏️ Editar</button>
        <button class="btn-del" onclick="openDel(${p.id})">🗑</button>
      </div>
    </div>
  `).join("");
}

// ---- RENDER TOTAL ----
function renderTotal() {
  const t = payments.filter(p => !isEnded(p)).reduce((a, p) => a + p.valor, 0);
  document.getElementById("totalValue").textContent = formatBRL(t);
}

// ---- RENDER CALENDAR ----
function renderCal() {
  const today = new Date();
  const cy = today.getFullYear(), cm = today.getMonth();
  document.getElementById("calTitle").textContent = `${MONTHS[cm]} ${cy}`;

  // DOW headers
  document.getElementById("calDow").innerHTML = DOWS.map(d =>
    `<div class="cal-dow">${d}</div>`
  ).join("");

  const dim = new Date(cy, cm+1, 0).getDate();
  const fd = new Date(cy, cm, 1).getDay();

  let html = Array(fd).fill('<div></div>').join("");

  for (let d = 1; d <= dim; d++) {
    const isT = d === today.getDate();
    const due = payments.filter(p => {
      if (isEnded(p)) return false;
      const s = parseDate(p.dataInicio), e = parseDate(p.dataFim);
      const dt = new Date(cy, cm, d);
      return p.diaVencimento === d && dt >= s && dt <= e;
    });
    html += `<div class="cal-day${isT?" today":""}">
      <div class="cal-day-num">${d}</div>
      ${due.map(p => `<div class="cal-chip" style="background:${p.cor}22;border:1px solid ${p.cor}44;color:${p.cor}">${formatBRL(p.valor)}</div>`).join("")}
    </div>`;
  }
  document.getElementById("calGrid").innerHTML = html;

  // Legend
  document.getElementById("calLegend").innerHTML = payments
    .filter(p => !isEnded(p))
    .map(p => `<div class="cal-legend-item"><div class="cal-legend-dot" style="background:${p.cor}"></div>${p.nome} — dia ${p.diaVencimento}</div>`)
    .join("");
}

// ---- TABS ----
function switchTab(t) {
  currentTab = t;
  document.getElementById("panel-lista").style.display = t === "lista" ? "block" : "none";
  document.getElementById("panel-cal").style.display = t === "cal" ? "block" : "none";
  document.getElementById("tab-lista").className = "tab" + (t === "lista" ? " active" : "");
  document.getElementById("tab-cal").className = "tab" + (t === "cal" ? " active" : "");
  if (t === "cal") renderCal();
}

// ---- COLOR PICKER ----
function renderColorPicker(sel) {
  document.getElementById("colorRow").innerHTML = CORES.map(c =>
    `<div class="color-dot${c===sel?" selected":""}" style="background:${c};${c===sel?"box-shadow:0 0 8px "+c:""}" onclick="selectCor('${c}')"></div>`
  ).join("");
}

function selectCor(c) {
  selectedCor = c;
  renderColorPicker(c);
}

// ---- MODAL FORM ----
function openNew() {
  editingId = null;
  selectedCor = "#a78bfa";
  document.getElementById("modalTitle").textContent = "➕ Novo Pagamento";
  document.getElementById("btnSaveLabel").textContent = "Adicionar";
  ["fNome","fValor","fDia","fInicio","fFim","fEmail","fTel"].forEach(id => document.getElementById(id).value = "");
  renderColorPicker(selectedCor);
  document.getElementById("modalOverlay").classList.add("open");
}

function openEdit(id) {
  const p = payments.find(x => x.id === id);
  if (!p) return;
  editingId = id;
  selectedCor = p.cor;
  document.getElementById("modalTitle").textContent = "✏️ Editar Pagamento";
  document.getElementById("btnSaveLabel").textContent = "Salvar";
  document.getElementById("fNome").value = p.nome;
  document.getElementById("fValor").value = p.valor;
  document.getElementById("fDia").value = p.diaVencimento;
  document.getElementById("fInicio").value = p.dataInicio;
  document.getElementById("fFim").value = p.dataFim;
  document.getElementById("fEmail").value = p.email;
  document.getElementById("fTel").value = p.telefone;
  renderColorPicker(selectedCor);
  document.getElementById("modalOverlay").classList.add("open");
}

function closeModal() {
  document.getElementById("modalOverlay").classList.remove("open");
}

function handleSave() {
  const nome = document.getElementById("fNome").value.trim();
  const valor = parseFloat(document.getElementById("fValor").value);
  const dia = parseInt(document.getElementById("fDia").value);
  if (!nome || isNaN(valor) || isNaN(dia)) {
    alert("Preencha Nome, Valor e Dia do vencimento!");
    return;
  }
  const entry = {
    nome, valor, diaVencimento: dia,
    dataInicio: document.getElementById("fInicio").value,
    dataFim: document.getElementById("fFim").value,
    email: document.getElementById("fEmail").value.trim(),
    telefone: document.getElementById("fTel").value.trim(),
    cor: selectedCor,
  };
  if (editingId === null) {
    payments.push({ ...entry, id: Date.now() });
  } else {
    payments = payments.map(p => p.id === editingId ? { ...entry, id: p.id } : p);
  }
  save();
  render();
  closeModal();
}

// ---- DELETE ----
function openDel(id) {
  deletingId = id;
  document.getElementById("delOverlay").classList.add("open");
}

function closeDelModal() {
  document.getElementById("delOverlay").classList.remove("open");
  deletingId = null;
}

function confirmDelete() {
  payments = payments.filter(p => p.id !== deletingId);
  save();
  render();
  closeDelModal();
}

// ---- CLOSE ON BACKDROP ----
document.getElementById("modalOverlay").addEventListener("click", function(e) {
  if (e.target === this) closeModal();
});
document.getElementById("delOverlay").addEventListener("click", function(e) {
  if (e.target === this) closeDelModal();
});

// ---- MAIN RENDER ----
function render() {
  renderList();
  renderTotal();
  if (currentTab === "cal") renderCal();
}

render();
</script>
</body>
</html>
